<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Modern purple gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#915eff" />
      <stop offset="100%" stop-color="#3b1d7d" />
    </linearGradient>
    <!-- Secondary glowing gradient -->
    <linearGradient id="glowGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bf61ff" />
      <stop offset="100%" stop-color="#804dee" />
    </linearGradient>
    <!-- Soft shadow filter for 3D depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#915eff" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Glowing outer circular orbits -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#glowGrad)" stroke-width="2" stroke-dasharray="20 10 5 10" opacity="0.4" />
  <circle cx="100" cy="100" r="75" fill="none" stroke="url(#purpleGrad)" stroke-width="4" stroke-linecap="round" stroke-dasharray="200 100" />

  <!-- The stylized letter H with 3D shadow and gradient fill -->
  <g filter="url(#shadow)">
    <!-- Left vertical bar of H -->
    <path d="M 65 50 L 85 50 L 85 150 L 65 150 Z" fill="url(#purpleGrad)" rx="5" />
    <!-- Right vertical bar of H -->
    <path d="M 115 50 L 135 50 L 135 150 L 115 150 Z" fill="url(#purpleGrad)" rx="5" />
    <!-- Horizontal bridge of H -->
    <path d="M 83 90 L 117 90 L 117 110 L 83 110 Z" fill="url(#glowGrad)" />
    <!-- Outer accent sphere inside the loop -->
    <circle cx="100" cy="100" r="10" fill="#ffffff" />
  </g>
</svg>
